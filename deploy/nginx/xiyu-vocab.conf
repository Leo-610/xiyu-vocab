# 西语背单词 — Nginx 生产配置
# 用法：
#   1. 将 api.yourdomain.com 替换为你的备案域名
#   2. 将 ssl 证书路径改为实际路径
#   3. sudo ln -s $(pwd)/deploy/nginx/xiyu-vocab.conf /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

# API + 管理后台 + 静态配图
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    # 证书（Let's Encrypt 或云厂商）
    ssl_certificate     /etc/ssl/certs/api.yourdomain.com.pem;
    ssl_certificate_key /etc/ssl/private/api.yourdomain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    client_max_body_size 4m;

    # Node.js API（PM2 跑在 3000）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 单词配图（后端 /static/images/）
    location /static/images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 用户头像
    location /static/avatars/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1d;
    }

    # 管理后台
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查（可选直连）
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}

# 可选：H5 静态站（若不用 CDN 单独托管前端）
