<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>西语背单词 · 管理后台</title>
  <style>
    :root { --primary: #c1121f; --bg: #faf7f5; --card: #fff; --muted: #6b7280; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 24px; color: #1a1a2e; }
    h1 { color: var(--primary); margin-bottom: 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(193,18,31,.06); }
    .card h2 { font-size: 16px; margin: 0 0 12px; }
    .bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #f4a261); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    td, th { padding: 8px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #fce4ec; color: var(--primary); }
    .tag.pending { background: #fff3e0; color: #e65100; }
    .slot { font-family: monospace; font-size: 12px; color: var(--muted); }
    a { color: var(--primary); }
  </style>
</head>
<body>
  <h1>西语背单词 · 管理后台</h1>
  <p class="sub">内容缺口一览 · 西语同学交付进度 · <a href="/api/content/status" target="_blank">JSON API</a></p>
  <div id="app">加载中...</div>
  <script>
    async function load() {
      const [res, pilotRes] = await Promise.all([
        fetch('/api/content/status'),
        fetch('/api/admin/pilot-report'),
      ])
      const d = await res.json()
      const p = await pilotRes.json()
      const el = document.getElementById('app')
      el.innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>词库总进度</h2>
            <p><strong>${d.wordsTotal}</strong> / ${d.targetTotal} 词</p>
            <div class="bar"><div class="bar-fill" style="width:${Math.round(d.wordsTotal/d.targetTotal*100)}%"></div></div>
            <p>缺口：<strong>${d.gaps.words}</strong> 词待补充</p>
          </div>
          <div class="card">
            <h2>多媒体缺口</h2>
            <p>配图缺口：${d.gaps.images} · 变位：${d.gaps.conjugations} · 音频：${d.gaps.audio}</p>
            <p>易混词辨析待填：${d.gaps.confusableNotes} 组</p>
          </div>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>DELE 分级交付槽位（西语同学填写）</h2>
          <table>
            <tr><th>等级</th><th>进度</th><th>CSV</th><th>配图目录</th><th>路径</th></tr>
            ${d.levelProgress.map(l => `
              <tr>
                <td><strong>${l.level}</strong></td>
                <td>${l.current}/${l.target} (${l.percent}%)</td>
                <td>${l.csvSubmitted ? '✅' : '⬜ 待提交'}</td>
                <td>${l.imageCount} 张 ${l.imagesDirReady ? '' : '(目录待建)'}</td>
                <td class="slot">${l.slot}</td>
              </tr>
            `).join('')}
          </table>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>试用数据（大创中期附件）</h2>
          <p>活跃 7 日：<strong>${p.users.activeLast7Days}</strong> · 活跃 30 日：<strong>${p.users.activeLast30Days}</strong> / 目标 30</p>
          <p>累计答题：<strong>${p.learning.wordsAnswered}</strong> · 正确率：<strong>${p.learning.accuracyPercent}%</strong> · 打卡：<strong>${p.learning.checkins}</strong></p>
          <p class="sub" style="margin:8px 0 12px">生成时间 ${p.generatedAt}</p>
          <button id="exportPilot" style="background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer">下载 JSON 报告</button>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>团队任务板</h2>
          <table>
            <tr><th>负责人</th><th>任务</th><th>交付路径</th><th>状态</th></tr>
            ${d.teamTasks.map(t => `
              <tr>
                <td>${t.owner}</td>
                <td>${t.task}</td>
                <td class="slot">${t.path}</td>
                <td><span class="tag ${t.status.includes('待') ? 'pending' : ''}">${t.status}</span></td>
              </tr>
            `).join('')}
          </table>
        </div>
      `
      document.getElementById('exportPilot')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' })
        const a = document.createElement('a')
        a.href = URL.createObjectURL(blob)
        a.download = `pilot-report-${p.generatedAt.slice(0, 10)}.json`
        a.click()
      })
    }
    load().catch(e => { document.getElementById('app').textContent = '请先启动后端: node backend/src/index.js' })
  </script>
</body>
</html>
