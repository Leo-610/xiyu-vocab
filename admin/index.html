<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>西语背单词 · 管理后台</title>
  <style>
    :root { --primary: #c1121f; --bg: #faf7f5; --card: #fff; --muted: #6b7280; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 24px; color: #1a1a2e; }
    h1 { color: var(--primary); margin-bottom: 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(193,18,31,.06); }
    .card h2 { font-size: 16px; margin: 0 0 12px; }
    .bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #f4a261); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    td, th { padding: 8px; text-align: left; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #fce4ec; color: var(--primary); }
    .tag.pending { background: #fff3e0; color: #e65100; }
    .slot { font-family: monospace; font-size: 12px; color: var(--muted); }
    a { color: var(--primary); }
    button { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 6px; }
    button.secondary { background: #6b7280; }
    .summary { white-space: pre-wrap; font-size: 13px; line-height: 1.5; max-width: 420px; }
  </style>
</head>
<body>
  <h1>西语背单词 · 管理后台</h1>
  <p class="sub">内容缺口 · RAG/LLM 审核 · 对照实验 · <a href="/api/content/status" target="_blank">JSON API</a></p>
  <div id="app">加载中...</div>
  <script>
    async function reviewItem(id, status) {
      const res = await fetch('/api/admin/ai-reviews/' + id, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status, reviewer: 'admin' }),
      })
      const data = await res.json()
      if (!res.ok) {
        alert(data.error || '审核失败')
        return
      }
      await load()
    }

    async function load() {
      const [res, pilotRes, aiRes] = await Promise.all([
        fetch('/api/content/status'),
        fetch('/api/admin/pilot-report'),
        fetch('/api/admin/ai-reviews?status=pending'),
      ])
      const d = await res.json()
      const p = await pilotRes.json()
      const ai = await aiRes.json()
      const el = document.getElementById('app')
      const expRows = (p.experiment?.last7DaysByArm || []).map(r => `
        <tr>
          <td><strong>${r.arm}</strong> ${r.label || ''}</td>
          <td>${r.users}</td>
          <td>${r.activeLast7Days}</td>
          <td>${r.wordsAnswered}</td>
          <td>${r.accuracyPercent}%</td>
        </tr>
      `).join('')
      const reviews = (ai.reviews || []).map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.lemma || '-'}<br/><span class="slot">${r.meaning_zh || ''}</span></td>
          <td><div class="summary">${(r.output?.summary_zh || '').replace(/</g, '&lt;')}</div></td>
          <td><span class="tag pending">${r.status}</span><br/><span class="slot">${r.model || ''}</span></td>
          <td>
            <button onclick="reviewItem(${r.id}, 'approved')">通过</button>
            <button class="secondary" onclick="reviewItem(${r.id}, 'rejected')">驳回</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="5">暂无待审项</td></tr>'

      el.innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>词库总进度</h2>
            <p><strong>${d.wordsTotal}</strong> / ${d.targetTotal} 词</p>
            <div class="bar"><div class="bar-fill" style="width:${Math.round(d.wordsTotal/d.targetTotal*100)}%"></div></div>
            <p>缺口：<strong>${d.gaps.words}</strong> 词待补充</p>
          </div>
          <div class="card">
            <h2>多媒体 / RAG</h2>
            <p>配图缺口：${d.gaps.images} · 变位：${d.gaps.conjugations} · 音频：${d.gaps.audio}</p>
            <p>语料块：<strong>${d.corpus?.chunks ?? 0}</strong> · 词链：${d.corpus?.linked ?? 0}</p>
            <p>AI 待审：${d.gaps.aiReviewsPending ?? 0} · 易混词待填：${d.gaps.confusableNotes}</p>
          </div>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>对照实验（近 7 日）</h2>
          <p class="sub" style="margin:0 0 12px">${p.experiment?.description || ''}</p>
          <table>
            <tr><th>臂</th><th>用户</th><th>活跃</th><th>答题</th><th>正确率</th></tr>
            ${expRows || '<tr><td colspan="5">暂无数据</td></tr>'}
          </table>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>AI 解析审核队列</h2>
          <p class="sub" style="margin:0 0 12px">LLM ${ai.llm?.configured ? '已配置 · ' + (ai.llm.model || '') : '未配置（使用模板解析）'} · 待审 ${ai.llm?.pendingReviews ?? 0}</p>
          <table>
            <tr><th>ID</th><th>词</th><th>解析</th><th>状态</th><th>操作</th></tr>
            ${reviews}
          </table>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>DELE 分级交付槽位（西语同学填写）</h2>
          <table>
            <tr><th>等级</th><th>进度</th><th>CSV</th><th>配图目录</th><th>路径</th></tr>
            ${d.levelProgress.map(l => `
              <tr>
                <td><strong>${l.level}</strong></td>
                <td>${l.current}/${l.target} (${l.percent}%)</td>
                <td>${l.csvSubmitted ? '✅' : '⬜ 待提交'}</td>
                <td>${l.imageCount} 张 ${l.imagesDirReady ? '' : '(目录待建)'}</td>
                <td class="slot">${l.slot}</td>
              </tr>
            `).join('')}
          </table>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>试用数据（大创中期附件）</h2>
          <p>活跃 7 日：<strong>${p.users.activeLast7Days}</strong> · 活跃 30 日：<strong>${p.users.activeLast30Days}</strong> / 目标 30</p>
          <p>累计答题：<strong>${p.learning.wordsAnswered}</strong> · 正确率：<strong>${p.learning.accuracyPercent}%</strong> · 打卡：<strong>${p.learning.checkins}</strong></p>
          <p class="sub" style="margin:8px 0 12px">生成时间 ${p.generatedAt}</p>
          <button id="exportBtn">下载 JSON 报告</button>
        </div>
        <div class="card" style="margin-top:24px">
          <h2>团队任务板</h2>
          <table>
            <tr><th>负责人</th><th>任务</th><th>交付路径</th><th>状态</th></tr>
            ${d.teamTasks.map(t => `
              <tr>
                <td>${t.owner}</td>
                <td>${t.task}</td>
                <td class="slot">${t.path}</td>
                <td><span class="tag ${t.status.includes('待') ? 'pending' : ''}">${t.status}</span></td>
              </tr>
            `).join('')}
          </table>
        </div>
      `
      document.getElementById('exportBtn')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(p, null, 2)], { type: 'application/json' })
        const a = document.createElement('a')
        a.href = URL.createObjectURL(blob)
        a.download = `pilot-report-${p.generatedAt.slice(0, 10)}.json`
        a.click()
      })
    }
    window.reviewItem = reviewItem
    load().catch(e => { document.getElementById('app').textContent = '请先启动后端: node backend/src/index.js · ' + e.message })
  </script>
</body>
</html>
